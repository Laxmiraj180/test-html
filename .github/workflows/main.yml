
name: GCP Federation Test
on: [push]

permissions:
  contents: 'read'
  id-token: 'write' # REQUIRED for Federation

jobs:
  test-gcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/532503278687/locations/global/workloadIdentityPools/github-pool-gcp/providers/github-provider'
          service_account: 'github-service-account@project-8974ab00-6de0-4119-9d7.iam.gserviceaccount.com'

      - name: 'List Buckets'
        run: gcloud storage ls
